<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical University of Munich</title>
    <link rel="stylesheet" href="/styles/site.css">
    <link rel="stylesheet" href="/explore/universities/universities.css">
</head>
<body>
    <header>
        <div class="site-header">
            <a href="/index.html" class="logo">TFS</a>
            <a href="/explore/universities/" class="btn-secondary">Back to list</a>
        </div>
    </header>
    <main class="explore-main">
        <section class="explore-content" style="width:100%">
            <div class="university-card" style="max-width:600px;margin:2rem auto;">
                <img class="university-logo" src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Logo_TUM.svg" alt="TUM logo" />
                <div class="university-name">Technical University of Munich</div>
                <div class="university-location">Munich, Germany</div>
                <div class="university-tags">
                    <span class="university-tag">Public</span>
                    <span class="university-tag">English</span>
                    <span class="university-tag">Scholarship available</span>
                </div>
                <div class="university-desc">One of Europe’s top universities, offering programs in engineering, natural sciences, life sciences, medicine, and social sciences.</div>
                <div class="university-actions">
                    <a href="https://www.tum.de/en/" target="_blank" class="btn-primary">Visit Website</a>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
